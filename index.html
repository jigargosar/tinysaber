<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Beat Saber MVP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: hsl(270,100%,3%); overflow: hidden; font-family: monospace; }
  canvas { display: block; }

  #ui {
    position: fixed;
    bottom: 24px; right: 24px;
    display: flex; flex-direction: column;
    align-items: flex-end; pointer-events: none;
  }
  #enter-btn {
    pointer-events: all;
    padding: 14px 36px;
    background: hsl(270,80%,40%);
    color: hsl(270,100%,90%);
    border: 2px solid hsl(270,80%,60%);
    border-radius: 6px;
    font-family: monospace;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  #enter-btn:hover { background: hsl(270,80%,55%); }
  #enter-btn:disabled { opacity: 0.4; cursor: default; }
  #status {
    margin-top: 16px;
    color: hsl(270,60%,70%);
    font-size: 13px;
    letter-spacing: 1px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="ui">
  <button id="enter-btn">Enter VR</button>
  <div id="status">Quest Browser · Local HTTPS or localhost required</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Renderer ─────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

// ─── Scene ────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color('hsl(270,100%,3%)');
scene.fog = new THREE.Fog(0x050005, 20, 60);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 1.6, 0);
scene.add(camera);

// Lighting
scene.add(new THREE.AmbientLight(0x8866aa, 2));
const fill = new THREE.DirectionalLight(0xffffff, 1.2);
fill.position.set(0, 5, -5);
scene.add(fill);

// Floor grid
const grid = new THREE.GridHelper(40, 40, 0x330055, 0x1a0033);
scene.add(grid);

// Tunnel walls
for (let z = -2; z > -40; z -= 4) {
  const geo = new THREE.PlaneGeometry(0.02, 2.5);
  const mat = new THREE.MeshBasicMaterial({ color: 0x220044, side: THREE.DoubleSide });
  [-1.5, 1.5].forEach(x => {
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x, 1.2, z);
    scene.add(m);
  });
}

// ─── Sabers ───────────────────────────────────────────────────────────────
const SABER_HANDLE_LENGTH = 0.22;
const SABER_BLADE_LENGTH  = 0.90;
const SABER_BLADE_RADIUS  = 0.018;
const SABER_HANDLE_RADIUS = 0.03;
const SABER_GLOW_RADIUS   = 0.04;
const SABER_REACH         = SABER_HANDLE_LENGTH / 2 + SABER_BLADE_LENGTH; // 1.01

function makeSaber(color) {
  const g = new THREE.Group();
  const inner = new THREE.Group();
  inner.rotation.x = -Math.PI / 2;
  g.add(inner);

  const handle = new THREE.Mesh(
    new THREE.CylinderGeometry(SABER_HANDLE_RADIUS, SABER_HANDLE_RADIUS, SABER_HANDLE_LENGTH, 8),
    new THREE.MeshLambertMaterial({ color: 0x222222 })
  );
  inner.add(handle);

  const blade = new THREE.Mesh(
    new THREE.CylinderGeometry(SABER_BLADE_RADIUS, SABER_BLADE_RADIUS, SABER_BLADE_LENGTH, 8),
    new THREE.MeshBasicMaterial({ color })
  );
  blade.position.y = SABER_HANDLE_LENGTH / 2 + SABER_BLADE_LENGTH / 2;
  inner.add(blade);

  const glow = new THREE.Mesh(
    new THREE.CylinderGeometry(SABER_GLOW_RADIUS, SABER_GLOW_RADIUS, SABER_BLADE_LENGTH, 8),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.15, depthWrite: false })
  );
  glow.position.y = blade.position.y;
  inner.add(glow);

  const light = new THREE.PointLight(color, 1.2, 1.5);
  light.position.y = SABER_REACH;
  inner.add(light);

  scene.add(g);
  return g;
}

const sabers = {
  left:  makeSaber(0xff2020),
  right: makeSaber(0x2060ff),
};
sabers.left.position.set(-0.5, 1.2, -0.4);
sabers.right.position.set(0.5, 1.2, -0.4);

// ─── Cubes ────────────────────────────────────────────────────────────────
const CUBE_SIZE       = 0.30;
const CUBE_GAP        = 0.12;
const LANE_SPACING    = CUBE_SIZE + CUBE_GAP;
const CUBE_HIT_MARGIN = Math.min(0.055, CUBE_GAP / 2);

const LANES_X = [
  -1.5 * LANE_SPACING,
  -0.5 * LANE_SPACING,
   0.5 * LANE_SPACING,
   1.5 * LANE_SPACING,
];
const LANES_Y  = [1.1, 1.6];
const SPAWN_Z  = -14;
const MISS_Z   =  1.2;
const CUBE_SPEED = 4;

const blockGeo     = new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE);
const collisionGeo = new THREE.BoxGeometry(
  CUBE_SIZE + CUBE_HIT_MARGIN * 2,
  CUBE_SIZE + CUBE_HIT_MARGIN * 2,
  CUBE_SIZE + CUBE_HIT_MARGIN * 2
);
const edgeGeo = new THREE.EdgesGeometry(collisionGeo);

let wireframeOn = true;

const MATS = {
  red:  new THREE.MeshLambertMaterial({ color: 0xff2020, transparent: true, opacity: 0.45, side: THREE.DoubleSide, depthWrite: false }),
  blue: new THREE.MeshLambertMaterial({ color: 0x2060ff, transparent: true, opacity: 0.45, side: THREE.DoubleSide, depthWrite: false }),
};
const EDGE_MATS = {
  red:  new THREE.LineBasicMaterial({ color: 0xffffff }),
  blue: new THREE.LineBasicMaterial({ color: 0xffffff }),
};

let blocks = [];

function spawnCube(x, y, z, isRed) {
  const key = isRed ? 'red' : 'blue';
  const mat = MATS[key].clone();
  const mesh = new THREE.Mesh(blockGeo, mat);
  mesh.position.set(x, y, z);
  const edges = new THREE.LineSegments(edgeGeo, EDGE_MATS[key]);
  edges.visible = wireframeOn;
  mesh.add(edges);
  mesh.userData = { isRed, alive: true };
  scene.add(mesh);
  blocks.push(mesh);
}

function spawnBlock() {
  spawnCube(
    LANES_X[Math.floor(Math.random() * LANES_X.length)],
    LANES_Y[Math.floor(Math.random() * LANES_Y.length)],
    SPAWN_Z,
    Math.random() < 0.5
  );
}

function spawnDebugWave() {
  const DEBUG_Z = -2.5;
  for (const x of LANES_X) {
    for (const y of LANES_Y) {
      spawnCube(x, y, DEBUG_Z, x < 0);
    }
  }
}

// ─── Particles ────────────────────────────────────────────────────────────
const partGeo = new THREE.BoxGeometry(0.06, 0.06, 0.06);
let particles = [];

function explode(pos, color) {
  const mat = new THREE.MeshBasicMaterial({ color });
  for (let i = 0; i < 12; i++) {
    const p = new THREE.Mesh(partGeo, mat);
    p.position.copy(pos);
    p.userData = {
      vel: new THREE.Vector3((Math.random()-0.5)*4, (Math.random()-0.5)*4, (Math.random()-0.5)*4),
      life: 0.45 + Math.random() * 0.2,
    };
    scene.add(p);
    particles.push(p);
  }
}

// ─── Score HUD ────────────────────────────────────────────────────────────
const hudCanvas = document.createElement('canvas');
hudCanvas.width = 320; hudCanvas.height = 80;
const hudCtx = hudCanvas.getContext('2d');
const hudTex = new THREE.CanvasTexture(hudCanvas);
const hudSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: hudTex, depthTest: false }));
hudSprite.position.set(0, 2.4, -3);
hudSprite.scale.set(1.8, 0.45, 1);
scene.add(hudSprite);

let score = 0;
function drawHUD() {
  hudCtx.clearRect(0, 0, 320, 80);
  hudCtx.fillStyle = 'hsl(270,80%,55%)';
  hudCtx.font = 'bold 52px monospace';
  hudCtx.textAlign = 'center';
  hudCtx.textBaseline = 'middle';
  hudCtx.fillText(score, 160, 40);
  hudTex.needsUpdate = true;
}
drawHUD();

// ─── Cheat Sheet ──────────────────────────────────────────────────────────
const sheetCanvas = document.createElement('canvas');
sheetCanvas.width = 256; sheetCanvas.height = 230;
const sheetCtx = sheetCanvas.getContext('2d');
const sheetTex = new THREE.CanvasTexture(sheetCanvas);
const sheetMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(0.55, 0.50),
  new THREE.MeshBasicMaterial({ map: sheetTex, transparent: true, side: THREE.DoubleSide })
);
sheetMesh.position.set(-1.5, 1.5, -1.0);
sheetMesh.rotation.y = Math.atan2(1.5, 1.0);
scene.add(sheetMesh);

(function drawSheet() {
  sheetCtx.clearRect(0, 0, 256, 230);
  sheetCtx.fillStyle = 'rgba(0,0,0,0.75)';
  sheetCtx.roundRect(4, 4, 248, 222, 12); sheetCtx.fill();
  sheetCtx.strokeStyle = 'hsl(270,60%,50%)';
  sheetCtx.lineWidth = 2;
  sheetCtx.roundRect(4, 4, 248, 222, 12); sheetCtx.stroke();
  sheetCtx.font = 'bold 20px monospace';
  sheetCtx.textAlign = 'left';
  const lines = [
    ['CONTROLS',            'hsl(270,90%,85%)'],
    ['',                    ''],
    ['A  →  Music on/off',  'hsl(0,0%,80%)'],
    ['B  →  Wireframe',     'hsl(0,0%,80%)'],
    ['X  →  Spawn wave',    'hsl(0,0%,80%)'],
    ['',                    ''],
    ['Red   = Left saber',  'hsl(0,70%,70%)'],
    ['Blue  = Right saber', 'hsl(210,70%,70%)'],
  ];
  lines.forEach(([text, color], i) => {
    sheetCtx.fillStyle = color;
    sheetCtx.fillText(text, 18, 34 + i * 26);
  });
  sheetTex.needsUpdate = true;
})();

// ─── State & Wireframe ────────────────────────────────────────────────────
let musicOn = false;

function setWireframe(on) {
  wireframeOn = on;
  for (const b of blocks) {
    if (b.children[0]) b.children[0].visible = on;
    b.material.opacity     = on ? 0.45 : 1.0;
    b.material.transparent = on;
    b.material.side        = on ? THREE.DoubleSide : THREE.FrontSide;
    b.material.depthWrite  = !on;
    b.material.needsUpdate = true;
  }
}

// ─── Controller Buttons ───────────────────────────────────────────────────
// Quest 2: Right A=buttons[4] B=buttons[5] | Left X=buttons[4] Y=buttons[5]
const btnWasPressed = { A: false, B: false, X: false };

function checkAllButtons() {
  if (!xrSession) return;
  for (const src of xrSession.inputSources) {
    const gp = src?.gamepad;
    if (!gp) continue;

    if (src.handedness === 'right') {
      const aDown = gp.buttons[4]?.pressed ?? false;
      const bDown = gp.buttons[5]?.pressed ?? false;
      if (aDown && !btnWasPressed.A) { musicOn = !musicOn; if (musicOn) audioCtx.resume(); }
      btnWasPressed.A = aDown;
      if (bDown && !btnWasPressed.B) setWireframe(!wireframeOn);
      btnWasPressed.B = bDown;
    }

    if (src.handedness === 'left') {
      const xDown = gp.buttons[4]?.pressed ?? false;
      if (xDown && !btnWasPressed.X) spawnDebugWave();
      btnWasPressed.X = xDown;
    }
  }
}

// ─── Web Audio ────────────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const BPM = 120;
const BEAT_MS = (60 / BPM) * 1000;
let beatIdx = 0, lastBeat = 0;

function kick() {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.setValueAtTime(180, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
  g.gain.setValueAtTime(0.9, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
  o.start(); o.stop(audioCtx.currentTime + 0.35);
}

function snare() {
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.12, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*(1-i/d.length);
  const s = audioCtx.createBufferSource(), g = audioCtx.createGain();
  s.buffer = buf; s.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(0.4, audioCtx.currentTime);
  s.start();
}

function haptic(src, intensity = 0.8, ms = 100) {
  src?.gamepad?.hapticActuators?.[0]?.pulse(intensity, ms);
}

// ─── Hit Detection ────────────────────────────────────────────────────────
const SUBSTEPS = 6;

function segmentHitsBox(a, b, box) {
  const expanded = box.clone().expandByScalar(CUBE_HIT_MARGIN);
  const d = b.clone().sub(a);
  let tmin = 0, tmax = 1;
  for (const axis of ['x', 'y', 'z']) {
    const da = d[axis];
    if (Math.abs(da) < 1e-8) {
      if (a[axis] < expanded.min[axis] || a[axis] > expanded.max[axis]) return false;
    } else {
      const t0 = (expanded.min[axis] - a[axis]) / da;
      const t1 = (expanded.max[axis] - a[axis]) / da;
      tmin = Math.max(tmin, Math.min(t0, t1));
      tmax = Math.min(tmax, Math.max(t0, t1));
      if (tmin > tmax) return false;
    }
  }
  return true;
}

function checkHits(bladeStart, bladeEnd, prevStart, prevEnd, inputSrc, isLeftHand) {
  for (let i = blocks.length - 1; i >= 0; i--) {
    const b = blocks[i];
    if (!b.userData.alive) continue;

    const h = CUBE_SIZE / 2;
    const box = new THREE.Box3(
      new THREE.Vector3(b.position.x - h, b.position.y - h, b.position.z - h),
      new THREE.Vector3(b.position.x + h, b.position.y + h, b.position.z + h)
    );
    let hit = false;

    for (let s = 0; s <= SUBSTEPS && !hit; s++) {
      const t = s / SUBSTEPS;
      const start = prevStart.clone().lerp(bladeStart, t);
      const end   = prevEnd.clone().lerp(bladeEnd, t);
      hit = segmentHitsBox(start, end, box);
    }

    if (hit) {
      b.userData.alive = false;
      scene.remove(b);
      blocks.splice(i, 1);
      explode(b.position, b.userData.isRed ? 0xff2020 : 0x2060ff);
      const correct = isLeftHand === b.userData.isRed;
      score += correct ? 100 : 25;
      drawHUD();
      haptic(inputSrc, correct ? 0.9 : 0.4, correct ? 120 : 60);
    }
  }
}

// ─── XR Session ───────────────────────────────────────────────────────────
let xrSession = null, refSpace = null;

document.getElementById('enter-btn').addEventListener('click', async () => {
  if (!navigator.xr) { status('WebXR not available'); return; }
  const ok = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
  if (!ok) { status('immersive-vr not supported on this device/browser'); return; }

  xrSession = await navigator.xr.requestSession('immersive-vr', {
    requiredFeatures: ['local-floor'],
    optionalFeatures: ['hand-tracking'],
  });
  refSpace = await xrSession.requestReferenceSpace('local-floor');
  await renderer.xr.setSession(xrSession);

  xrSession.addEventListener('end', () => {
    xrSession = null; refSpace = null;
    document.getElementById('ui').style.display = 'flex';
  });

  document.getElementById('ui').style.display = 'none';
});

function status(msg) {
  document.getElementById('status').textContent = msg;
}

// ─── Game Loop ────────────────────────────────────────────────────────────
let lastTime = 0, spawnTimer = 0;
const SPAWN_INTERVAL = 1.0;
const tmpPos = new THREE.Vector3();

const prevBlade = {
  left:  { start: new THREE.Vector3(), end: new THREE.Vector3() },
  right: { start: new THREE.Vector3(), end: new THREE.Vector3() },
};

renderer.setAnimationLoop((time, frame) => {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  // Beat
  if (musicOn) {
    if (time - lastBeat > BEAT_MS) {
      lastBeat = time;
      const b = beatIdx++ % 4;
      if (b === 0 || b === 2) kick(); else snare();
    }
  }

  // Spawn
  spawnTimer += dt;
  if (spawnTimer >= SPAWN_INTERVAL) { spawnBlock(); spawnTimer = 0; }

  // Move blocks first — hit check sees post-move position = rendered position
  for (let i = blocks.length - 1; i >= 0; i--) {
    const b = blocks[i];
    b.position.z += CUBE_SPEED * dt;
    if (b.position.z > MISS_Z) { scene.remove(b); blocks.splice(i, 1); }
  }

  // Button checks — no frame needed, runs from session.inputSources directly
  checkAllButtons();

  // Controller pose + hit detection
  if (frame && refSpace) {
    for (const src of frame.session.inputSources) {
      if (!src.gripSpace) continue;
      const pose = frame.getPose(src.gripSpace, refSpace);
      if (!pose) continue;

      const hand = src.handedness === 'left' ? 'left' : 'right';
      const saber = sabers[hand];
      const m = new THREE.Matrix4().fromArray(pose.transform.matrix);
      m.decompose(saber.position, saber.quaternion, saber.scale);
      tmpPos.copy(saber.position);

      const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(saber.quaternion);
      const bladeStart = tmpPos.clone();
      const bladeTip   = tmpPos.clone().addScaledVector(forward, SABER_REACH);

      checkHits(bladeStart, bladeTip, prevBlade[hand].start, prevBlade[hand].end, src, hand === 'left');

      prevBlade[hand].start.copy(bladeStart);
      prevBlade[hand].end.copy(bladeTip);
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.userData.vel.y -= 8 * dt;
    p.position.addScaledVector(p.userData.vel, dt);
    p.userData.life -= dt;
    if (p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
  }

  renderer.render(scene, camera);
});

// ─── Resize ───────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Beat Saber Web</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: hsl(270,100%,3%);
    color: hsl(270,60%,80%);
    font-family: monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  h1 {
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: hsl(270,40%,50%);
    padding-bottom: 24px;
  }
  a {
    display: block;
    padding: 14px 48px;
    border: 1px solid hsl(270,60%,35%);
    border-radius: 4px;
    color: hsl(270,80%,80%);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  a:hover {
    background: hsl(270,60%,15%);
    border-color: hsl(270,80%,60%);
    color: hsl(270,100%,90%);
  }
  .sub {
    font-size: 11px;
    color: hsl(270,30%,40%);
    letter-spacing: 1px;
    text-align: center;
    padding-top: 2px;
  }
</style>
</head>
<body>
  <h1>Beat Saber Web</h1>
  <a href="/beat-saber.html">Beat Saber MVP</a>
  <p class="sub">v17 · blocks · music · scoring</p>
  <a href="/playground.html">IWER Playground</a>
  <p class="sub">WebXR emulator · DevUI controls</p>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>IWER Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #06010f; overflow: hidden; font-family: 'Courier New', monospace; }

  #overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    pointer-events: none;
    z-index: 10;
  }
  #enter-btn {
    pointer-events: all;
    padding: 12px 40px;
    background: transparent;
    color: #c084fc;
    border: 1px solid #7c3aed;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  #enter-btn:hover {
    background: #7c3aed22;
    border-color: #c084fc;
    box-shadow: 0 0 20px #7c3aed55;
  }
  #hint {
    color: #6b21a8;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #score-display {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    color: #c084fc;
    font-size: 13px;
    letter-spacing: 2px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #score-display.active { opacity: 1; }
</style>

</head>
<body>

<div id="overlay">
  <button id="enter-btn">ENTER VR</button>
  <div id="hint">IWER DevUI · keyboard + mouse controls</div>
</div>
<div id="score-display">SCORE: <span id="score-val">0</span></div>

<script type="module" src="/playground.js"></script>
</body>
</html>
